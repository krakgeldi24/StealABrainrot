<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Steal a Brainrot - Roblox Style</title>
<style>
    body { margin:0; overflow:hidden; background:#111; font-family: 'Comic Sans MS', cursive; }
    #ui {
        position: absolute; top: 15px; left: 15px; color: white; z-index: 100;
        background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px; border: 3px solid #ff00ff;
    }
    #money { font-size: 28px; font-weight: bold; color: #00ff00; text-shadow: 0 0 10px #00ff00; }
    button {
        margin: 8px 5px; padding: 12px 20px; font-size: 18px; background: linear-gradient(#ff00ff, #aa00aa);
        color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
    }
    button:hover { transform: scale(1.05); }
</style>
</head>
<body>
<div id="ui">
    <div id="money">Para: <span id="moneyAmount">500</span> $</div>
    <button id="buyBtn">🛒 Brainrot Satın Al (100$)</button>
    <button id="lockBtn">🔒 Base'i Kilitle (30s)</button>
    <div style="margin-top:10px">Brainrot: <span id="brainCount">0</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ================== KURULUM ==================
let scene, camera, renderer;
let player, bat;
let money = 500;
let brainrots = [];
let aiBots = [];
let baseLocked = false;

const brainrotTypes = [
    {name: "Skibidi Rizzler", color: 0xff00ff, value: 35},
    {name: "Ohio Sigma", color: 0x00ffff, value: 55},
    {name: "Tralalero", color: 0xffff00, value: 20},
    {name: "Fanum Tax", color: 0xff8800, value: 28},
];

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x220033, 20, 120);

    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 200);
    
    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Işıklar
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffddaa, 1);
    sun.position.set(20, 40, 30);
    sun.castShadow = true;
    scene.add(sun);

    // Zemin (Roblox tarzı grid)
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(120, 120),
        new THREE.MeshLambertMaterial({color: 0x113311})
    );
    ground.rotation.x = -Math.PI/2;
    ground.receiveShadow = true;
    scene.add(ground);

    createPlayer();
    createBat();

    // Base duvarları
    createBase();

    // Kontroller
    document.getElementById('buyBtn').onclick = buyBrainrot;
    document.getElementById('lockBtn').onclick = toggleLock;

    spawnInitialBrainrots();
    spawnAIBots(4);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
}

// ================== OYUNCU (Daha iyi Roblox tarzı) ==================
function createPlayer() {
    player = new THREE.Group();

    // Vücut
    const body = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 2, 0.8),
        new THREE.MeshLambertMaterial({color: 0x4488ff})
    );
    body.position.y = 2;
    body.castShadow = true;
    player.add(body);

    // Kafa
    const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.7, 16, 16),
        new THREE.MeshLambertMaterial({color: 0xffddaa})
    );
    head.position.set(0, 3.8, 0);
    head.castShadow = true;
    player.add(head);

    player.position.set(0, 0, 8);
    scene.add(player);
}

function createBat() {
    bat = new THREE.Mesh(
        new THREE.BoxGeometry(0.25, 0.25, 3.5),
        new THREE.MeshLambertMaterial({color: 0x8B5A2B})
    );
    bat.position.set(1.2, 2.5, 0);
    bat.rotation.z = 0.8;
    player.add(bat);
}

// ================== BASE ==================
function createBase() {
    const wallMat = new THREE.MeshLambertMaterial({color: 0x555577});
    const w = new THREE.Mesh(new THREE.BoxGeometry(25, 6, 1), wallMat);
    w.position.set(0, 3, -12);
    scene.add(w);
}

// ================== BRAINROT ==================
function createBrainrot(type) {
    const group = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.SphereGeometry(1.1, 20, 20),
        new THREE.MeshLambertMaterial({color: type.color})
    );
    group.add(body);

    // Gözler (brainrot etkisi)
    const eyeGeo = new THREE.SphereGeometry(0.25, 12, 12);
    const eye1 = new THREE.Mesh(eyeGeo, new THREE.MeshLambertMaterial({color: 0xffffff}));
    eye1.position.set(-0.4, 0.4, 0.9);
    group.add(eye1);
    const eye2 = eye1.clone();
    eye2.position.x = 0.4;
    group.add(eye2);

    group.userData = {type: type, value: type.value, owner: "player"};
    return group;
}

function spawnInitialBrainrots() {
    for (let i = 0; i < 5; i++) {
        const type = brainrotTypes[Math.floor(Math.random()*brainrotTypes.length)];
        const br = createBrainrot(type);
        br.position.set(
            (Math.random()-0.5)*20,
            1.2,
            (Math.random()-0.5)*15 - 5
        );
        scene.add(br);
        brainrots.push(br);
    }
}

function buyBrainrot() {
    if (money < 100) return alert("Paran yetmiyor sigma!");
    money -= 100;
    updateUI();

    const type = brainrotTypes[Math.floor(Math.random()*brainrotTypes.length)];
    const br = createBrainrot(type);
    br.position.copy(player.position);
    br.position.x += (Math.random()-0.5)*4;
    br.position.z += 5;
    scene.add(br);
    brainrots.push(br);
}

// ================== AI BOTLAR ==================
function spawnAIBots(count) {
    for (let i = 0; i < count; i++) {
        const bot = new THREE.Group();

        const body = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 2, 0.8),
            new THREE.MeshLambertMaterial({color: 0xff4444})
        );
        body.position.y = 2;
        bot.add(body);

        const head = new THREE.Mesh(
            new THREE.SphereGeometry(0.7, 16, 16),
            new THREE.MeshLambertMaterial({color: 0xffddaa})
        );
        head.position.y = 3.8;
        bot.add(head);

        bot.position.set(
            (Math.random()-0.5)*35,
            0,
            (Math.random()-0.5)*25 - 10
        );
        bot.userData = {speed: 0.12, targetBrain: null};
        scene.add(bot);
        aiBots.push(bot);
    }
}

// ================== KİLİTLEME ==================
function toggleLock() {
    if (baseLocked) return;
    baseLocked = true;
    document.getElementById('lockBtn').textContent = "🔒 KİLİTLENDİ (30s)";
    
    setTimeout(() => {
        baseLocked = false;
        document.getElementById('lockBtn').textContent = "🔒 Base'i Kilitle (30s)";
    }, 30000);
}

// ================== ANA DÖNGÜ ==================
function animate() {
    requestAnimationFrame(animate);

    // Basit hareket (klavye ile)
    document.addEventListener('keydown', (e) => {
        const speed = 0.4;
        if (e.key === 'w' || e.key === 'W') player.position.z -= speed;
        if (e.key === 's' || e.key === 'S') player.position.z += speed;
        if (e.key === 'a' || e.key === 'A') player.position.x -= speed;
        if (e.key === 'd' || e.key === 'D') player.position.x += speed;
    }, {once: true}); // her frame'de dinlememek için basit yöntem

    // Kamera takip
    camera.position.set(player.position.x, player.position.y + 8, player.position.z + 18);
    camera.lookAt(player.position.x, player.position.y + 2, player.position.z);

    // AI'ların basit hareketi
    aiBots.forEach(bot => {
        if (Math.random() < 0.03 && brainrots.length > 0) {
            bot.userData.targetBrain = brainrots[Math.floor(Math.random() * brainrots.length)];
        }

        if (bot.userData.targetBrain) {
            const dir = bot.userData.targetBrain.position.clone().sub(bot.position).normalize();
            bot.position.add(dir.multiplyScalar(bot.userData.speed));
        }

        // Çalma girişimi
        if (!baseLocked && Math.random() < 0.02) {
            brainrots.forEach((br, index) => {
                if (br.userData.owner === "player" && 
                    bot.position.distanceTo(br.position) < 4) {
                    br.userData.owner = "ai";
                    money = Math.max(50, money - 60);
                    updateUI();
                    console.log("AI brainrot'unu çaldı!");
                }
            });
        }
    });

    // Para kazanma
    if (Math.random() < 0.05) {
        const owned = brainrots.filter(b => b.userData.owner === "player").length;
        money += owned * 4;
        updateUI();
    }

    renderer.render(scene, camera);
}

function updateUI() {
    document.getElementById('moneyAmount').textContent = Math.floor(money);
    document.getElementById('brainCount').textContent = brainrots.filter(b => b.userData.owner === "player").length;
}

init();

alert("🎮 Steal a Brainrot - Geliştirilmiş Versiyon\n\nW A S D = Hareket\n\nBrainrot'ları topla, AI'larınkini çal!\nSpace tuşu henüz eklenmedi, geliştiriyoruz.");
</script>
</body>
</html>
