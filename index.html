<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Steal a Brainrot - Düzeltilmiş Versiyon</title>
<style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
    #ui {
        position: absolute; top: 15px; left: 15px; color: #0f0; z-index: 100;
        background: rgba(0,0,0,0.6); padding: 12px; border-radius: 10px; font-size: 22px;
    }
    #instructions {
        position: absolute; bottom: 20px; left: 20px; color: #ccc; z-index: 100; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;
    }
</style>
</head>
<body>
<div id="ui">Para: <span id="money">1500</span>$ &nbsp; Brainrot: <span id="count">0</span></div>
<div id="instructions">
    <strong>Sol Tıkla</strong> → Fareyi Kilitle (ekranı döndür)<br>
    WASD → Hareket | SPACE → Sopayla Vur | E → Base'ini Kilitle (30 saniye)
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/PointerLockControls.js"></script>

<script>
// ====================== DEĞİŞKENLER ======================
let scene, camera, renderer, controls;
let player, bat;
let money = 1500;
let ownedBrainrots = 0;
let brainrots = [];
let aiBots = [];
let baseLocked = false;

let move = { forward: false, backward: false, left: false, right: false };

const brainrotNames = ["Skibidi Rizzler","Ohio Sigma","Tralalero Tralala","Fanum Tax","Gyatt Mewing","Sigma Male","Rizz God","Looksmaxxing","Gooning Edge","Brainrot King"];

// ====================== BAŞLAT ======================
function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x220033, 50, 200);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 8, 30);   // <-- Daha güvenli başlangıç pozisyonu

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Işıklar
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(30, 60, 40);
    scene.add(dirLight);

    // Zemin
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.MeshLambertMaterial({ color: 0x225522 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    createPlayer();
    createSimpleBases();

    // Pointer Lock
    controls = new THREE.PointerLockControls(camera, document.body);

    document.addEventListener('click', () => {
        controls.lock();
    });

    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);

    spawnBrainrotLoop();
    spawnAIBots(5);

    window.addEventListener('resize', onResize);

    animate();
}

// ====================== OYUNCU ======================
function createPlayer() {
    player = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(1.6, 2.6, 1.1),
        new THREE.MeshLambertMaterial({color: 0x3366ff})
    );
    body.position.y = 2;
    body.castShadow = true;
    player.add(body);

    const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.85, 20, 20),
        new THREE.MeshLambertMaterial({color: 0xffddaa})
    );
    head.position.y = 4.2;
    player.add(head);

    player.position.set(0, 0, 15);
    scene.add(player);

    // Sopası
    bat = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, 0.3, 4.2),
        new THREE.MeshLambertMaterial({color: 0x8B5A2B})
    );
    bat.position.set(2, 2.8, 0);
    bat.rotation.z = 1.1;
    player.add(bat);
}

function createSimpleBases() {
    // Basit 6 base platformu (renkli)
    const positions = [[-45,-45],[45,-45],[-45,0],[45,0],[-45,45],[45,45]];
    const colors = [0xff0000,0x00ff00,0x0000ff,0xffff00,0xff00ff,0x00ffff];

    positions.forEach((p, i) => {
        const plat = new THREE.Mesh(
            new THREE.PlaneGeometry(28, 28),
            new THREE.MeshLambertMaterial({color: colors[i]})
        );
        plat.rotation.x = -Math.PI/2;
        plat.position.set(p[0], 0.1, p[1]);
        scene.add(plat);
    });
}

// ====================== BRAINROT ======================
function createBrainrot() {
    const type = {
        name: brainrotNames[Math.floor(Math.random()*brainrotNames.length)],
        color: new THREE.Color().setHSL(Math.random(), 1, 0.6),
        value: Math.floor(Math.random() * 70) + 20
    };

    const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(1.4, 24, 24),
        new THREE.MeshLambertMaterial({color: type.color})
    );
    mesh.userData = {value: type.value, owner: "neutral"};
    return mesh;
}

function spawnBrainrotLoop() {
    setInterval(() => {
        if (brainrots.length > 60) return;
        const br = createBrainrot();
        br.position.set((Math.random()-0.5)*80, 1.5, -70);
        scene.add(br);
        brainrots.push(br);
    }, 800);
}

// ====================== AI ======================
function spawnAIBots(count) {
    for (let i = 0; i < count; i++) {
        const bot = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.6, 1.1), new THREE.MeshLambertMaterial({color: 0xff3366}));
        body.position.y = 2;
        bot.add(body);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.85, 20, 20), new THREE.MeshLambertMaterial({color: 0xffddaa}));
        head.position.y = 4.2;
        bot.add(head);

        bot.position.set((Math.random()-0.5)*90, 0, (Math.random()-0.5)*90);
        scene.add(bot);
        aiBots.push(bot);
    }
}

// ====================== KONTROLLER ======================
function onKeyDown(e) {
    switch(e.key.toLowerCase()) {
        case 'w': move.forward = true; break;
        case 's': move.backward = true; break;
        case 'a': move.left = true; break;
        case 'd': move.right = true; break;
        case ' ': swingBat(); break;
        case 'e': toggleLock(); break;
    }
}

function onKeyUp(e) {
    switch(e.key.toLowerCase()) {
        case 'w': move.forward = false; break;
        case 's': move.backward = false; break;
        case 'a': move.left = false; break;
        case 'd': move.right = false; break;
    }
}

function swingBat() {
    bat.rotation.z = -2.5;
    setTimeout(() => bat.rotation.z = 1.1, 180);

    brainrots.forEach((br, i) => {
        if (player.position.distanceTo(br.position) < 8) {
            if (br.userData.owner !== "player") {
                br.userData.owner = "player";
                money += br.userData.value;
                ownedBrainrots++;
                updateUI();
            }
        }
    });
}

function toggleLock() {
    if (baseLocked) return;
    baseLocked = true;
    console.log("%cBase kilitlendi! 30 saniye korunuyor.", "color:lime;font-weight:bold");
    setTimeout(() => { baseLocked = false; }, 30000);
}

// ====================== ANA DÖNGÜ ======================
function animate() {
    requestAnimationFrame(animate);

    if (controls.isLocked) {
        const speed = 0.45;

        if (move.forward) controls.moveForward(speed);
        if (move.backward) controls.moveForward(-speed);
        if (move.left) controls.moveRight(-speed);
        if (move.right) controls.moveRight(speed);

        // Oyuncu modelini kameraya bağla
        player.position.x = camera.position.x;
        player.position.z = camera.position.z;
        player.position.y = 0;
        player.rotation.y = camera.rotation.y + Math.PI; // yön düzeltme
    }

    // Brainrot ilerlemesi
    for (let i = brainrots.length - 1; i >= 0; i--) {
        const br = brainrots[i];
        if (br.userData.owner === "neutral") {
            br.position.z += 0.12;

            if (player.position.distanceTo(br.position) < 6) {
                br.userData.owner = "player";
                money += br.userData.value;
                ownedBrainrots++;
                updateUI();
                scene.remove(br);
                brainrots.splice(i, 1);
            }
        }
    }

    // Basit AI hareketi
    aiBots.forEach(bot => {
        if (Math.random() < 0.03 && brainrots.length) {
            const target = brainrots[Math.floor(Math.random() * brainrots.length)];
            if (target.userData.owner === "neutral") {
                const dir = target.position.clone().sub(bot.position).normalize();
                bot.position.add(dir.multiplyScalar(0.18));
            }
        }
    });

    if (Math.random() < 0.06) {
        money += ownedBrainrots * 5;
        updateUI();
    }

    renderer.render(scene, camera);
}

function updateUI() {
    document.getElementById('money').textContent = Math.floor(money);
    document.getElementById('count').textContent = ownedBrainrots;
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

init();

alert("✅ Düzeltilmiş versiyon yüklendi!\n\nÖnce sayfaya SOL TIKLA (fare kilidi için)\nSonra WASD ile hareket et.\nEğer hala siyahsa sayfayı yenile (F5) ve tekrar sol tıkla.");
</script>
</body>
</html>
