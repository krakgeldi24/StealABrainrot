<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Steal a Brainrot - 6 Base Edition</title>
<style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
    #ui {
        position: absolute; top: 10px; left: 10px; color: #0f0; z-index: 100;
        background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; font-size: 20px;
    }
    #instructions {
        position: absolute; bottom: 15px; left: 15px; color: #bbb; z-index: 100;
    }
</style>
</head>
<body>
<div id="ui">Para: <span id="money">1200</span>$ &nbsp;&nbsp; Brainrot: <span id="count">0</span></div>
<div id="instructions">
    Sol Tık → Fare Kilitle (döndür)<br>
    WASD → Hareket | SPACE → Vur | E → Base'ini Kilitle (30s)
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/PointerLockControls.js"></script>

<script>
// ====================== AYARLAR ======================
let scene, camera, renderer, controls;
let player, bat;
let money = 1200;
let ownedBrainrots = 0;
let brainrots = [];
let aiBots = [];
let bases = [];
let baseLocked = false;
let lockEndTime = 0;

const brainrotNames = [
    "Skibidi Rizzler","Ohio Sigma","Tralalero Tralala","Fanum Tax","Gyatt Mewing","Sigma Male","Rizz God","Skibidi Toilet",
    "Bussin Ohio","Alpha Wolf","Gooning Edge","Mewing Master","Level 10 Gyatt","Fanum Taxing","Looksmaxxing","Beta Cuck",
    "Aesthetic Sigma","Brainrot King","Tralala Sigma","Ohio Final Boss","Rizzler 3000","Skibidi Sigma","Gegagedigedago",
    "Pipe Worm","Chimpanzini Bananini","Lirili Larilla","Bombardiro Crocodilo","Frigo Camelo","Spirita Cappuccina",
    // Daha fazla ekleyebiliriz, şu an 30+ var, kod içinde rastgele kombinasyon yapacak
];

function getRandomBrainrot() {
    const name = brainrotNames[Math.floor(Math.random() * brainrotNames.length)];
    const hue = Math.random() * 360;
    return {
        name: name,
        color: new THREE.Color(`hsl(${hue}, 100%, 60%)`),
        value: Math.floor(Math.random() * 60) + 15
    };
}

// ====================== INIT ======================
function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x110022, 40, 180);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 300);
    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffeecc, 1);
    sun.position.set(50, 80, 30);
    scene.add(sun);

    // Büyük zemin
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.MeshLambertMaterial({color: 0x113311})
    );
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    createPlayer();
    create6Bases();
    createCentralConveyor();

    controls = new THREE.PointerLockControls(camera, document.body);
    document.addEventListener('click', () => controls.lock());

    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);

    spawnAIBots(6);
    spawnBrainrotLoop();

    animate();
}

// ====================== OYUNCU ======================
function createPlayer() {
    player = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.5, 1), new THREE.MeshLambertMaterial({color: 0x4488ff}));
    body.position.y = 2;
    player.add(body);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 20, 20), new THREE.MeshLambertMaterial({color: 0xffddaa}));
    head.position.y = 4;
    player.add(head);

    player.position.set(0, 0, 20);
    scene.add(player);

    bat = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 4), new THREE.MeshLambertMaterial({color: 0x8B4513}));
    bat.position.set(2, 2.5, 0);
    bat.rotation.z = 1;
    player.add(bat);
}

// ====================== 6 BASE ======================
function create6Bases() {
    const positions = [
        {x: -40, z: -40}, {x: 40, z: -40},
        {x: -40, z: 0},   {x: 40, z: 0},
        {x: -40, z: 40},  {x: 40, z: 40}
    ];
    const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff];

    positions.forEach((pos, i) => {
        const baseGroup = new THREE.Group();

        // Zemin platformu
        const platform = new THREE.Mesh(
            new THREE.PlaneGeometry(25, 25),
            new THREE.MeshLambertMaterial({color: colors[i]})
        );
        platform.rotation.x = -Math.PI/2;
        platform.position.set(pos.x, 0.1, pos.z);
        baseGroup.add(platform);

        // Duvarlar
        const wallMat = new THREE.MeshLambertMaterial({color: 0x555555});
        const wall1 = new THREE.Mesh(new THREE.BoxGeometry(25, 6, 1), wallMat);
        wall1.position.set(pos.x, 3, pos.z - 12);
        baseGroup.add(wall1);

        const wall2 = wall1.clone();
        wall2.rotation.y = Math.PI / 2;
        wall2.position.set(pos.x - 12, 3, pos.z);
        baseGroup.add(wall2);

        scene.add(baseGroup);
        bases.push({group: baseGroup, pos: new THREE.Vector3(pos.x, 0, pos.z), owner: i === 0 ? "player" : "ai", locked: false});
    });
}

// ====================== ORTADAKİ CONVEYOR (Yürüyen Brainrotlar) ======================
function createCentralConveyor() {
    const conveyor = new THREE.Mesh(
        new THREE.BoxGeometry(80, 1, 8),
        new THREE.MeshLambertMaterial({color: 0x333333})
    );
    conveyor.position.set(0, 0.5, 0);
    scene.add(conveyor);
}

function spawnBrainrotLoop() {
    setInterval(() => {
        if (brainrots.length > 80) return; // fazla kalabalık olmasın

        const type = getRandomBrainrot();
        const br = new THREE.Mesh(
            new THREE.SphereGeometry(1.3, 20, 20),
            new THREE.MeshLambertMaterial({color: type.color})
        );

        br.position.set(
            (Math.random() - 0.5) * 60,
            1.5,
            -60 + Math.random() * 10   // arkadan öne doğru yürüyormuş gibi
        );

        br.userData = {type, value: type.value, owner: "neutral", speed: 0.08 + Math.random()*0.06};
        scene.add(br);
        brainrots.push(br);
    }, 600);
}

// ====================== AI BOTLAR ======================
function spawnAIBots(count) {
    for (let i = 0; i < count; i++) {
        const bot = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.5, 1), new THREE.MeshLambertMaterial({color: 0xff4444}));
        body.position.y = 2;
        bot.add(body);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 20, 20), new THREE.MeshLambertMaterial({color: 0xffddaa}));
        head.position.y = 4;
        bot.add(head);

        bot.position.set((Math.random()-0.5)*70, 0, (Math.random()-0.5)*70);
        bot.userData = {speed: 0.12, targetBrain: null, homeBase: i+1};
        scene.add(bot);
        aiBots.push(bot);
    }
}

// ====================== KONTROLLER ======================
function onKeyDown(e) {
    if (e.key === 'e' || e.key === 'E') {
        toggleBaseLock();
    }
    if (e.key === ' ') {
        swingBat();
    }
}

function toggleBaseLock() {
    if (baseLocked) return;
    baseLocked = true;
    lockEndTime = Date.now() + 30000;
    console.log("%cBase'in 30 saniyeliğine kilitlendi! Kimse giremez.", "color: lime");
    setTimeout(() => baseLocked = false, 30000);
}

function swingBat() {
    bat.rotation.z = -2.2;
    setTimeout(() => bat.rotation.z = 1, 200);

    brainrots.forEach((br, index) => {
        if (player.position.distanceTo(br.position) < 7) {
            if (br.userData.owner !== "player") {
                br.userData.owner = "player";
                money += br.userData.value;
                ownedBrainrots++;
                updateUI();
            }
        }
    });
}

// ====================== ANA LOOP ======================
function animate() {
    requestAnimationFrame(animate);

    if (controls.isLocked) {
        const speed = 0.4;
        if (keys['w'] || keys['W']) controls.moveForward(speed);
        if (keys['s'] || keys['S']) controls.moveForward(-speed);
        if (keys['a'] || keys['A']) controls.moveRight(-speed);
        if (keys['d'] || keys['D']) controls.moveRight(speed);

        player.position.copy(controls.getObject().position);
        player.position.y = 0;
    }

    // Brainrot'ların ilerlemesi (conveyor etkisi)
    brainrots.forEach((br, i) => {
        if (br.userData.owner === "neutral") {
            br.position.z += br.userData.speed;

            // Oyuncuya yakınsa topla
            if (player.position.distanceTo(br.position) < 5) {
                br.userData.owner = "player";
                money += br.userData.value;
                ownedBrainrots++;
                updateUI();
                scene.remove(br);
                brainrots.splice(i, 1);
            }
        }
    });

    // AI'ların davranışı (basit)
    aiBots.forEach(bot => {
        if (Math.random() < 0.03 && brainrots.length > 0) {
            bot.userData.targetBrain = brainrots[Math.floor(Math.random()*brainrots.length)];
        }
        if (bot.userData.targetBrain) {
            const dir = bot.userData.targetBrain.position.clone().sub(bot.position).normalize();
            bot.position.add(dir.multiplyScalar(bot.userData.speed * 0.6));
        }

        // Çalma girişimi
        if (!baseLocked && Math.random() < 0.02) {
            brainrots.forEach(br => {
                if (br.userData.owner === "player" && bot.position.distanceTo(br.position) < 6) {
                    br.userData.owner = "ai";
                    money = Math.max(200, money - 80);
                    updateUI();
                }
            });
        }
    });

    // Pasif gelir
    if (Math.random() < 0.05) {
        money += ownedBrainrots * 6;
        updateUI();
    }

    renderer.render(scene, camera);
}

const keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);

function updateUI() {
    document.getElementById('money').textContent = Math.floor(money);
    document.getElementById('count').textContent = ownedBrainrots;
}

init();

alert("🎮 Steal a Brainrot - 6 Base Modu\n\nSol tıkla fareyi kilitle\nWASD hareket\nSPACE vur\nE tuşu ile base'ini kilitle\n\nOrtadan geçen brainrot'ları topla, AI'ları izle!");
</script>
</body>
</html>
