<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Steal a Brainrot - 3D Edition</title>
<style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
    #ui {
        position: absolute; top: 10px; left: 10px; color: white; z-index: 100;
        background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;
    }
    #money { font-size: 24px; font-weight: bold; color: #00ff00; }
    button {
        margin: 5px; padding: 8px 16px; font-size: 16px; background: #ff00ff;
        color: white; border: none; border-radius: 6px; cursor: pointer;
    }
    button:hover { background: #ff44ff; }
</style>
</head>
<body>
<div id="ui">
    <div id="money">Para: <span id="moneyAmount">500</span> $</div>
    <button id="buyBtn">Brainrot Satın Al (100$)</button>
    <button id="lockBtn">Base'i Kilitle (30s)</button>
    <div>Brainrot Sayısı: <span id="brainCount">0</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/PointerLockControls.js"></script>

<script>
// ================== DEĞİŞKENLER ==================
let scene, camera, renderer, controls;
let player, bat;
let money = 500;
let brainrots = [];
let aiBots = [];
let baseLocked = false;
let lockTime = 0;

const BRAINROT_TYPES = [
    {name: "Noobini Pizzanini", color: 0xff0000, value: 8, rarity: "common"},
    {name: "Tim Cheese", color: 0xffff00, value: 12, rarity: "common"},
    {name: "Tralalero Tralala", color: 0x00ff00, value: 25, rarity: "rare"},
    {name: "Skibidi Rizzler", color: 0xff00ff, value: 40, rarity: "epic"},
    {name: "Ohio Sigma", color: 0x00ffff, value: 60, rarity: "legendary"}
];

// ================== THREE.JS KURULUMU ==================
function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x222222, 10, 100);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 15);

    renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Işık
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // Zemin (Base alanı)
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshLambertMaterial({color: 0x333333})
    );
    ground.rotation.x = -Math.PI/2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Oyuncu (basit Roblox-like kapsül)
    player = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.8, 2, 4, 8),
        new THREE.MeshLambertMaterial({color: 0x00aaff})
    );
    player.position.set(0, 2, 10);
    player.castShadow = true;
    scene.add(player);

    // Sopamız (Bat)
    bat = new THREE.Mesh(
        new THREE.BoxGeometry(0.2, 0.2, 3),
        new THREE.MeshLambertMaterial({color: 0x8B4513})
    );
    bat.position.set(1.5, 2, 0);
    player.add(bat); // oyuncuya bağlı

    // Basit duvarlar (kendi base'in)
    createBaseWalls();

    // Pointer Lock Controls (FPS gibi hareket)
    controls = new THREE.PointerLockControls(camera, document.body);
    document.addEventListener('click', () => controls.lock());

    // Eventler
    document.getElementById('buyBtn').addEventListener('click', buyBrainrot);
    document.getElementById('lockBtn').addEventListener('click', toggleLock);

    window.addEventListener('resize', onWindowResize);
    document.addEventListener('keydown', onKeyDown);

    spawnBrainrot();
    spawnAIBots(3);

    animate();
}

// ================== BASE WALLS ==================
function createBaseWalls() {
    const wallMat = new THREE.MeshLambertMaterial({color: 0x555555});
    const wallGeo = new THREE.BoxGeometry(20, 5, 1);

    // Arka duvar
    const back = new THREE.Mesh(wallGeo, wallMat);
    back.position.set(0, 2.5, -10);
    scene.add(back);

    // Sol duvar
    const left = new THREE.Mesh(new THREE.BoxGeometry(1, 5, 20), wallMat);
    left.position.set(-10, 2.5, 0);
    scene.add(left);

    // Sağ duvar
    const right = left.clone();
    right.position.x = 10;
    scene.add(right);
}

// ================== BRAINROT SPAWN ==================
function spawnBrainrot() {
    setInterval(() => {
        if (Math.random() > 0.6) {
            const type = BRAINROT_TYPES[Math.floor(Math.random() * BRAINROT_TYPES.length)];
            const brain = new THREE.Mesh(
                new THREE.SphereGeometry(1, 16, 16),
                new THREE.MeshLambertMaterial({color: type.color})
            );
            brain.position.set(
                (Math.random()-0.5)*30,
                1,
                (Math.random()-0.5)*20 - 5
            );
            brain.userData = {type: type, value: type.value, stolen: false};
            scene.add(brain);
            brainrots.push(brain);

            // Basit floating text efekti (console'a yazdırıyoruz)
            console.log(`%c${type.name} spawn oldu!`, "color:yellow");
        }
    }, 1500);
}

// ================== AI BOTLAR ==================
function spawnAIBots(count) {
    for (let i = 0; i < count; i++) {
        const bot = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.8, 2, 4, 8),
            new THREE.MeshLambertMaterial({color: 0xff8800})
        );
        bot.position.set(
            (Math.random()-0.5)*40,
            2,
            (Math.random()-0.5)*30 - 10
        );
        bot.userData = {speed: 0.08 + Math.random()*0.05, target: null, hasBrainrot: null};
        scene.add(bot);
        aiBots.push(bot);
    }
}

// ================== SATIN ALMA ==================
function buyBrainrot() {
    if (money < 100) {
        alert("Yeterli paran yok kral 😂");
        return;
    }
    money -= 100;
    updateUI();

    // Rastgele bir brainrot ver
    const type = BRAINROT_TYPES[Math.floor(Math.random() * BRAINROT_TYPES.length)];
    console.log(`✅ ${type.name} satın aldın! Base'ine gidip koy (şu an otomatik yakınında spawn oluyor)`);
    
    // Yakınına spawn et
    const brain = new THREE.Mesh(
        new THREE.SphereGeometry(1, 16, 16),
        new THREE.MeshLambertMaterial({color: type.color})
    );
    brain.position.copy(player.position);
    brain.position.z += 3;
    brain.userData = {type: type, value: type.value, owner: "player"};
    scene.add(brain);
    brainrots.push(brain);
}

// ================== BASE KİLİTLE ==================
function toggleLock() {
    if (baseLocked) return;
    baseLocked = true;
    lockTime = Date.now() + 30000;
    document.getElementById('lockBtn').textContent = "Kilitli (30s)";
    document.getElementById('lockBtn').style.background = "#00ff00";

    setTimeout(() => {
        baseLocked = false;
        document.getElementById('lockBtn').textContent = "Base'i Kilitle (30s)";
        document.getElementById('lockBtn').style.background = "#ff00ff";
    }, 30000);
}

// ================== HAREKET ve VURMA ==================
let move = {forward: false, backward: false, left: false, right: false};

function onKeyDown(e) {
    switch(e.code) {
        case 'KeyW': move.forward = true; break;
        case 'KeyS': move.backward = true; break;
        case 'KeyA': move.left = true; break;
        case 'KeyD': move.right = true; break;
        case 'Space': // Vuruş (sopa ile)
            swingBat();
            break;
    }
}

function swingBat() {
    bat.rotation.z = -1.5; // vuruş animasyonu
    setTimeout(() => bat.rotation.z = 0, 200);

    // Yakındaki brainrot'lara çarpma kontrolü
    brainrots.forEach((b, i) => {
        if (b.position.distanceTo(player.position) < 5) {
            // Çalma veya düşürme
            if (b.userData.owner && b.userData.owner !== "player") {
                alert("Bir AI'nın brainrot'unu çaldın! " + b.userData.type.name);
                b.userData.owner = "player";
                money += b.userData.value * 2;
                updateUI();
            }
        }
    });
}

// ================== UPDATE & ANIMATION ==================
function animate() {
    requestAnimationFrame(animate);

    // Basit oyuncu hareketi (WASD)
    const speed = 0.3;
    if (move.forward) player.position.z -= speed;
    if (move.backward) player.position.z += speed;
    if (move.left) player.position.x -= speed;
    if (move.right) player.position.x += speed;

    camera.position.set(player.position.x, player.position.y + 5, player.position.z + 12);
    camera.lookAt(player.position);

    // AI Botların basit davranışı
    aiBots.forEach(bot => {
        // Rastgele dolaş + brainrot avla
        if (Math.random() < 0.02) {
            bot.userData.target = brainrots[Math.floor(Math.random()*brainrots.length)];
        }

        if (bot.userData.target) {
            const dir = bot.userData.target.position.clone().sub(bot.position).normalize();
            bot.position.add(dir.multiplyScalar(bot.userData.speed));
        }

        // Oyuncunun brainrot'larına yaklaşınca çalma girişimi
        brainrots.forEach(br => {
            if (br.userData.owner === "player" && 
                bot.position.distanceTo(br.position) < 3 && 
                !baseLocked) {
                br.userData.owner = "ai";
                console.log("%cAI senin brainrot'unu çaldı!", "color:red");
                money = Math.max(0, money - 50);
                updateUI();
            }
        });
    });

    // Para kazanma (brainrot başına)
    if (Math.random() < 0.03) {
        let owned = brainrots.filter(b => b.userData.owner === "player").length;
        money += owned * 3;
        updateUI();
    }

    renderer.render(scene, camera);
}

function updateUI() {
    document.getElementById('moneyAmount').textContent = Math.floor(money);
    document.getElementById('brainCount').textContent = brainrots.filter(b => b.userData.owner === "player").length;
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// Başlat
init();

alert("Steal a Brainrot 3D versiyonuna hoş geldin!\n\nWASD = Hareket\nMouse = Bak\nSpace = Sopayla vur\nTıkla = Pointer Lock aktif et\n\nBrainrot'ları al, AI'larınkini çal, base'ini koru!");
</script>
</body>
</html>
